<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Serote Estates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="nav-brand" style="color:var(--night);margin-bottom:1.5rem;display:inline-flex">
        Serote<span class="accent" style="color:var(--brass)"> Estates</span>
      </a>
      <h1>Welcome Back</h1>
      <p class="subtitle">Log in to access your saved properties and bookings.</p>

      <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:0.75rem 1rem;font-size:0.82rem;color:var(--text-muted);margin-bottom:1.5rem">
        <strong>Demo credentials:</strong><br/>
        Admin: <code>admin@estatehub.co.za</code> / <code>Admin123</code><br/>
        Buyer: <code>thabo.k@gmail.com</code> / <code>Password123</code>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-control" placeholder="you@example.com" autocomplete="email" required />
          <span id="login-email-msg" class="form-message" aria-live="polite"></span>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="Enter your password" autocomplete="current-password" required />
          <span id="login-pw-msg" class="form-message" aria-live="polite"></span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;font-size:0.85rem">
          <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer">
            <input type="checkbox" id="login-remember" /> Remember me
          </label>
          <a href="#" style="color:var(--primary-light)">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Log In →</button>
      </form>

      <div class="auth-divider"><span>or</span></div>
      <p class="auth-switch">Don't have an account? <a href="register.html">Register here</a></p>
      <p class="auth-switch" style="margin-top:0.5rem"><a href="index.html">← Back to Home</a></p>
    </div>
  </div>

  <div id="toast-container" aria-live="polite"></div>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
