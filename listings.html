<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Listings – Serote Estates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <a href="index.html" class="nav-brand">Serote<span class="accent"> Estates</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="listings.html" class="active">Listings</a></li>
        <li><a href="favourites.html">Favourites</a></li>
        <li class="nav-admin-link" style="display:none"><a href="admin.html">Admin</a></li>
        <li class="nav-agent-link" style="display:none"><a href="landlord.html">My Portal</a></li>
        <li class="nav-buyer-link" style="display:none"><a href="#" onclick="openMyBookingsModal();return false">My Bookings</a></li>
      </ul>
      <div class="nav-auth hide-when-auth">
        <a href="login.html" class="btn btn-outline" style="color:#fff;border-color:rgba(255,255,255,0.5)">Log In</a>
        <a href="register.html" class="btn btn-accent btn-sm">Register</a>
      </div>
      <div class="nav-auth show-when-auth" style="display:none">
        <span style="color:rgba(255,255,255,0.8);font-size:0.88rem">👤 <span class="user-name-display"></span></span>
        <button class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:#fff" onclick="logoutUser()">Logout</button>
      </div>
      <button class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <!-- Page header -->
  <header class="page-header">
    <div class="container">
      <h1>Property Listings</h1>
      <p>Browse all available properties for sale and rent across South Africa</p>
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html">Home</a><span>›</span><span>Listings</span>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">

      <!-- Filter bar — URL query params (from hero search) are pre-applied by initListingsPage() -->
      <div class="filter-bar" role="search" aria-label="Property filters">
        <div class="filter-group">
          <label for="f-search">Search</label>
          <input type="search" id="f-search" placeholder="Title or suburb…" aria-label="Search properties" />
        </div>
        <div class="filter-group">
          <label for="f-city">City</label>
          <select id="f-city" aria-label="Filter by city">
            <option value="">All Cities</option>
            <option value="Johannesburg">Johannesburg</option>
            <option value="Pretoria">Pretoria</option>
            <option value="Midrand">Midrand</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="f-type">Type</label>
          <select id="f-type" aria-label="Filter by property type">
            <option value="">All Types</option>
            <option value="house">House</option>
            <option value="apartment">Apartment</option>
            <option value="townhouse">Townhouse</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="f-status">Status</label>
          <select id="f-status" aria-label="Filter by listing status">
            <option value="">Buy or Rent</option>
            <option value="for-sale">For Sale</option>
            <option value="for-rent">For Rent</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="f-max-price">Max Price (R)</label>
          <input type="number" id="f-max-price" placeholder="e.g. 3000000" aria-label="Maximum price" min="0" />
        </div>
        <div class="filter-group">
          <label for="f-beds">Min Beds</label>
          <select id="f-beds" aria-label="Minimum bedrooms">
            <option value="">Any</option>
            <option value="1">1+</option>
            <option value="2">2+</option>
            <option value="3">3+</option>
            <option value="4">4+</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="f-sort">Sort By</label>
          <select id="f-sort" aria-label="Sort listings">
            <option value="default">Featured</option>
            <option value="price-asc">Price: Low → High</option>
            <option value="price-desc">Price: High → Low</option>
            <option value="newest">Newest First</option>
          </select>
        </div>
        <!-- Result count is updated by renderListings() on every filter change -->
        <span id="results-count" aria-live="polite"></span>
      </div>

      <!-- Listings grid — populated by renderListings(); shows an empty state when no match found -->
      <div id="listings-grid" class="properties-grid" aria-label="Property listings">
        <!-- filled in by JS -->
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="footer-bottom" style="padding:1.2rem 0;text-align:center;border-top:none">
      <p>&copy; 2026 Serote Estates (Pty) Ltd. All rights reserved.</p>
    </div>
  </footer>

  <div id="toast-container" aria-live="polite"></div>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
